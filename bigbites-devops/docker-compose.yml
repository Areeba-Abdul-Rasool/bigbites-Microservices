version: "3.9"

# ─────────────────────────────────────────────────────────────
#  BigBites – Local Dev Stack
#  Services: MySQL · Zookeeper · Kafka · 5 Spring Boot apps
# ─────────────────────────────────────────────────────────────

networks:
  bigbites-net:
    driver: bridge

volumes:
  mysql_data:

services:

  # ── Infrastructure ─────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: bigbites-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-areeb@4821}
      MYSQL_DATABASE: BigBites
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bigbites-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-areeb@4821}"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bigbites-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bigbites-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bigbites-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - bigbites-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Microservices ──────────────────────────────────────────

  product-service:
    build:
      context: ../product-service
      dockerfile: ../bigbites-devops/product-service/Dockerfile
    container_name: bigbites-product
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/BigBites
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-areeb@4821}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - bigbites-net

  order-service:
    build:
      context: ../order-service
      dockerfile: ../bigbites-devops/order-service/Dockerfile
    container_name: bigbites-order
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/BigBites
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-areeb@4821}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICE_PRODUCT_URL: http://product-service:8082
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - bigbites-net

  cart-service:
    build:
      context: ../cart-service
      dockerfile: ../bigbites-devops/cart-service/Dockerfile
    container_name: bigbites-cart
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      order-service:
        condition: service_started
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/BigBites
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-areeb@4821}
      SERVICE_PRODUCT_URL: http://product-service:8082
      SERVICE_ORDER_URL: http://order-service:8081
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - bigbites-net

  payment-service:
    build:
      context: ../payment-service
      dockerfile: ../bigbites-devops/payment-service/Dockerfile
    container_name: bigbites-payment
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      order-service:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/BigBites
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-areeb@4821}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICE_ORDER_URL: http://order-service:8081
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - bigbites-net

  notification-service:
    build:
      context: ../notification-service
      dockerfile: ../bigbites-devops/notification-service/Dockerfile
    container_name: bigbites-notification
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/BigBites
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-areeb@4821}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - bigbites-net
